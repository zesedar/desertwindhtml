<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Desert Wind</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');

  :root {
    --amber: #ffb000;
    --amber-dim: #996a00;
    --amber-bright: #ffd966;
    --bg: #1a1205;
    --bg-screen: #0d0a03;
    --scanline: rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'VT323', monospace;
    overflow: hidden;
    touch-action: manipulation;
  }

  #monitor {
    width: 800px;
    max-width: 95vw;
    height: 92vh;
    height: 92dvh;
    background: var(--bg);
    border-radius: 24px;
    padding: 20px;
    box-shadow:
      0 0 60px rgba(255,176,0,0.08),
      inset 0 0 80px rgba(0,0,0,0.6);
    position: relative;
  }

  #screen {
    width: 100%;
    height: 100%;
    background: var(--bg-screen);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  #screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 10;
  }

  #screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
    z-index: 11;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    color: var(--amber);
    font-size: 18px;
    line-height: 1.5;
    scrollbar-width: thin;
    scrollbar-color: var(--amber-dim) transparent;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--amber-dim); border-radius: 3px; }

  .line { margin-bottom: 2px; white-space: pre-wrap; word-wrap: break-word; }
  .line.empty { height: 12px; }
  .line.title {
    color: var(--amber-bright);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    text-align: center;
    margin: 8px 0;
    text-shadow: 0 0 10px rgba(255,176,0,0.5);
  }
  .line.death { color: #ff4444; text-shadow: 0 0 8px rgba(255,0,0,0.4); }
  .line.success { color: #44ff44; text-shadow: 0 0 8px rgba(0,255,0,0.3); }
  .line.system { color: var(--amber-dim); font-style: italic; }

  #input-area {
    display: flex;
    align-items: center;
    padding: 8px 20px 14px;
    border-top: 1px solid rgba(255,176,0,0.1);
    background: rgba(0,0,0,0.3);
  }

  #prompt {
    color: var(--amber-bright);
    font-family: 'VT323', monospace;
    font-size: 18px;
    margin-right: 4px;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(255,176,0,0.4);
  }

  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--amber-bright);
    font-family: 'VT323', monospace;
    font-size: 18px;
    caret-color: var(--amber-bright);
    text-shadow: 0 0 4px rgba(255,176,0,0.3);
  }

  #cmd::placeholder { color: var(--amber-dim); }

  #sidebar {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 220px;
    background: rgba(13,10,3,0.95);
    border: 1px solid var(--amber-dim);
    border-radius: 8px;
    padding: 12px;
    color: var(--amber);
    font-family: 'VT323', monospace;
    font-size: 15px;
    z-index: 100;
    display: none;
  }

  #sidebar h3 {
    color: var(--amber-bright);
    font-size: 16px;
    margin-bottom: 8px;
    text-align: center;
    border-bottom: 1px solid var(--amber-dim);
    padding-bottom: 4px;
  }

  #sidebar ul { list-style: none; padding: 0; }
  #sidebar li { padding: 2px 0; }
  #sidebar li:empty::after { content: '(üres)'; color: var(--amber-dim); }

  /* CRT scanline effect without flicker */
  #screen { /* animation removed */ }

  #intro-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 50;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }

  #intro-canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* --- Mobile Action Bar --- */
  #mobile-bar {
    display: none;
    padding: 6px 8px;
    background: rgba(0,0,0,0.5);
    border-top: 1px solid rgba(255,176,0,0.15);
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 5;
  }

  #mobile-bar .btn-row {
    display: flex;
    gap: 4px;
    justify-content: center;
    width: 100%;
  }

  #mobile-bar button {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--amber);
    background: rgba(255,176,0,0.08);
    border: 1px solid var(--amber-dim);
    border-radius: 6px;
    padding: 8px 0;
    flex: 1;
    min-width: 0;
    max-width: 72px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  #mobile-bar button:active {
    background: rgba(255,176,0,0.25);
    color: var(--amber-bright);
  }

  #mobile-bar button.dir {
    font-size: 18px;
    font-weight: bold;
    color: var(--amber-bright);
    max-width: 56px;
  }

  #mobile-bar button.wide {
    max-width: 100px;
  }

  /* --- Mobile Inventory Toggle --- */
  #inv-toggle {
    display: none;
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 200;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: var(--amber);
    background: rgba(13,10,3,0.9);
    border: 1px solid var(--amber-dim);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  #inv-toggle:active {
    background: rgba(255,176,0,0.2);
  }

  /* --- Responsive: Tablet --- */
  @media (max-width: 860px) {
    #monitor {
      max-width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      padding: 8px;
    }

    #screen { border-radius: 6px; }

    #sidebar {
      top: 50px;
      right: 8px;
      width: 200px;
    }
  }

  /* --- Responsive: Mobile --- */
  @media (max-width: 600px) {
    #monitor {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      padding: 0;
    }

    #screen { border-radius: 0; }

    #output {
      font-size: 15px;
      padding: 10px 12px;
      line-height: 1.4;
    }

    .line.title {
      font-size: 11px;
    }

    #input-area {
      padding: 6px 12px 8px;
    }

    #prompt { font-size: 15px; }

    #cmd {
      font-size: 16px; /* Prevents iOS zoom on focus */
    }

    #mobile-bar { display: flex; }
    #inv-toggle { display: block; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      max-height: 100vh;
      border-radius: 0;
      border: none;
      padding: 50px 20px 20px;
      overflow-y: auto;
      background: rgba(13,10,3,0.97);
      z-index: 150;
    }

    #sidebar h3 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    #sidebar li {
      font-size: 18px;
      padding: 4px 0;
    }

    #sidebar .close-sidebar {
      display: block;
    }
  }

  /* --- Keyboard open: shrink layout --- */
  @media (max-height: 450px) and (max-width: 600px) {
    #output {
      font-size: 14px;
      padding: 6px 10px;
      line-height: 1.3;
    }

    #mobile-bar { display: none; }

    #input-area { padding: 4px 10px 6px; }
  }
</style>
</head>
<body>

<div id="monitor">
  <div id="screen">
    <div id="intro-overlay" onclick="startGame()">
      <canvas id="intro-canvas" width="640" height="480"></canvas>
    </div>
    <div id="output"></div>
    <div id="input-area">
      <span id="prompt">C:\&gt;</span>
      <input type="text" id="cmd" placeholder="parancs..." autocomplete="off" autofocus>
    </div>
    <div id="mobile-bar">
      <div class="btn-row">
        <button class="dir" onclick="mobileCmd('é')">É</button>
        <button class="dir" onclick="mobileCmd('d')">D</button>
        <button class="dir" onclick="mobileCmd('ny')">Ny</button>
        <button class="dir" onclick="mobileCmd('k')">K</button>
      </div>
      <div class="btn-row">
        <button class="wide" onclick="mobileCmd('keresek')">Keres</button>
        <button class="wide" onclick="mobileCmd('várok')">Vár</button>
        <button class="wide" onclick="mobileCmd('néz')">Néz</button>
        <button class="wide" onclick="mobileCmd('lista')">Tárgy</button>
      </div>
    </div>
  </div>
</div>

<button id="inv-toggle" onclick="toggleMobileSidebar()">🎒</button>

<div id="sidebar">
  <h3>🎒 Tárgyak</h3>
  <ul id="inv-list"></ul>
</div>

<script>
// ============================================================
// DESERT WIND - JavaScript konverzió (Act 1)
// Eredeti: Turbo Pascal - FoD Softworks
// ============================================================

// --- INTRO RAJZOLÁS (hű az eredeti Pascal grafikához) ---
const introCanvas = document.getElementById('intro-canvas');
const ctx = introCanvas.getContext('2d');
let porzasInterval = null;
let blinkInterval = null;

function drawIntro() {
  const W = 640, H = 480;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Keret (Line 0,0 -> 640,0 stb.)
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

  // "Desert Wind" cím - nagy betűk, ~(230, 60)
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px "Press Start 2P", monospace';
  ctx.textBaseline = 'top';
  ctx.fillText('Desert Wind', 150, 50);

  // Intro szöveg - kis betűk, ~(50, 110)
  ctx.font = '14px "Press Start 2P", monospace';
  ctx.fillText('A kiszámíthatatlan jövőbe utazol.', 30, 110);
  ctx.fillText('Egy átlagember bőrébe bújva éld át', 30, 130);
  ctx.fillText('a korszak minden szenvedését.', 30, 150);
  ctx.fillText('Közben törekedj a túlélésre.', 30, 170);

  // Kék ég - Bar(50,200,590,400)
  ctx.fillStyle = '#0000AA';
  ctx.fillRect(50, 200, 540, 200);

  // Sárga homok - Bar(50,350,590,400)
  ctx.fillStyle = '#CCAA00';
  ctx.fillRect(50, 350, 540, 50);

  // Homok gradiens hatás (finomabb átmenet)
  const sandGrad = ctx.createLinearGradient(50, 340, 50, 400);
  sandGrad.addColorStop(0, '#CCAA00');
  sandGrad.addColorStop(1, '#AA8800');
  ctx.fillStyle = sandGrad;
  ctx.fillRect(50, 350, 540, 50);

  // Nap - For i:=1 to 25 do Circle(520,240,i) -> kitöltött kör
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(520, 250, 25, 0, Math.PI * 2);
  ctx.fill();
  // Nap ragyogás
  ctx.strokeStyle = '#FFEE44';
  ctx.lineWidth = 1;
  for (let r = 26; r <= 32; r += 2) {
    ctx.globalAlpha = 1 - (r - 25) / 10;
    ctx.beginPath();
    ctx.arc(520, 250, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Fű - fu(x,y): 3 vonal (x,y)->(x-5,y-5), (x,y)->(x,y-5), (x,y)->(x+5,y-5)
  function drawGrass(x, y) {
    ctx.strokeStyle = '#00AA00';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x - 5, y - 5);
    ctx.moveTo(x, y); ctx.lineTo(x, y - 6);
    ctx.moveTo(x, y); ctx.lineTo(x + 5, y - 5);
    ctx.stroke();
  }
  // fu(60,360); fu(69,370); fu(82,365); fu(81,392);
  drawGrass(60, 360);
  drawGrass(69, 370);
  drawGrass(82, 365);
  drawGrass(81, 392);
  // Még néhány extra fűcsomó a sivatagi hangulatért
  drawGrass(150, 375);
  drawGrass(210, 362);
  drawGrass(310, 380);
  drawGrass(420, 368);
  drawGrass(500, 385);
  drawGrass(550, 370);

  // "Press any key to continue" - fehér, (230, 450)
  ctx.fillStyle = '#fff';
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillText('Kattints a folytatáshoz', 180, 450);

  // Villogás
  let blinkOn = true;
  blinkInterval = setInterval(() => {
    blinkOn = !blinkOn;
    if (blinkOn) {
      ctx.fillStyle = '#fff';
      ctx.font = '12px "Press Start 2P", monospace';
      ctx.fillText('Kattints a folytatáshoz', 180, 450);
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(178, 445, 300, 20);
    }
  }, 600);

  // Porzás animáció - homokszemcsék (az eredeti: random sárga pixel a homokon, ami eltűnik)
  startPorzas();
}

function startPorzas() {
  const particles = [];
  const maxParticles = 12;

  porzasInterval = setInterval(() => {
    // Töröljük az eltűnő szemcséket
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life--;
      if (p.life <= 0) {
        // Visszarajzoljuk az eredeti homok színt
        ctx.fillStyle = '#CCAA00';
        ctx.fillRect(p.x, p.y, 2, 2);
        particles.splice(i, 1);
      }
    }

    // Új szemcse
    if (particles.length < maxParticles) {
      const x = 55 + Math.random() * 530;
      const y = 352 + Math.random() * 44;
      const life = 3 + Math.floor(Math.random() * 8);
      particles.push({ x, y, life });

      // Világos sárga villanás
      ctx.fillStyle = '#FFE866';
      ctx.fillRect(x, y, 2, 2);
    }
  }, 80);
}

// Font betöltés megvárása, aztán rajzolás
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => drawIntro());
} else {
  setTimeout(drawIntro, 500);
}

// Intro billentyűzettel is indítható (mint az eredeti ReadKey)
document.addEventListener('keydown', function introKey(e) {
  if (introOverlay.style.display !== 'none') {
    startGame();
    document.removeEventListener('keydown', introKey);
  }
});

const output = document.getElementById('output');
const cmdInput = document.getElementById('cmd');
const introOverlay = document.getElementById('intro-overlay');
const sidebar = document.getElementById('sidebar');
const invList = document.getElementById('inv-list');
const mobileBar = document.getElementById('mobile-bar');
const invToggle = document.getElementById('inv-toggle');

// --- Mobile funkciók ---
function mobileCmd(cmd) {
  if (cmdInput.disabled) return;
  cmdInput.value = cmd;
  cmdInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
}

let sidebarOpen = false;
function toggleMobileSidebar() {
  sidebarOpen = !sidebarOpen;
  sidebar.style.display = sidebarOpen ? 'block' : 'none';
  if (sidebarOpen) {
    // Add close button if not present
    if (!sidebar.querySelector('.close-sidebar')) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'close-sidebar';
      closeBtn.textContent = '✕ Bezár';
      closeBtn.style.cssText = `
        display:block; margin:0 auto 12px; font-family:'VT323',monospace;
        font-size:18px; color:var(--amber); background:rgba(255,176,0,0.1);
        border:1px solid var(--amber-dim); border-radius:6px; padding:8px 24px;
        cursor:pointer;
      `;
      closeBtn.onclick = () => { sidebarOpen = false; sidebar.style.display = 'none'; };
      sidebar.insertBefore(closeBtn, sidebar.firstChild);
    }
  }
}

// --- VisualViewport kezelés (virtuális billentyűzet) ---
if (window.visualViewport) {
  const monitor = document.getElementById('monitor');
  window.visualViewport.addEventListener('resize', () => {
    const vvh = window.visualViewport.height;
    monitor.style.height = vvh + 'px';
    // Scroll output to bottom when keyboard appears
    setTimeout(() => { output.scrollTop = output.scrollHeight; }, 50);
  });
  window.visualViewport.addEventListener('scroll', () => {
    // Keep the page from scrolling behind the keyboard
    window.scrollTo(0, 0);
  });
}

// --- Játékállapot ---
const INITIAL_STATE = {
  a: 2, otth: 0, list: 0, lista: [],
  // Act 1
  black: 0, targ: 0, konyh: 0, konyv: 0, sote: 0, ouu: 0,
  necro: 0, abdul: 0, szant: 0,
  oreg: false, ker: false, vara: true, lll: false,
  ker5: false, ker7: false,
  // parancs
  parancs: '', para: '', targy: '', targyh: '',
  space: true, use: false,
  // Act 2
  tere: 0,
  radio1: false, puska: false, kar1: false,
  nyilas: false, banya: false,
  kotszer: false, gyogyszer: false,
  cuccokgy: false, cuccokcs: false, cuccokinj: false,
  ak: false, radio: false,
  blackgun2: false, blackgun: false,
  tars: false, radio2: false,
  kaja: false, katonak: false, kapu: false,
  // Act 3
  necro2: 0, levett: false, radsuit: false,
  saddam: false, hatalomkulcs: false,
};

function freshState() {
  return Object.assign({}, INITIAL_STATE, { lista: [] });
}

let state = freshState();

function addItem(name) {
  state.list++;
  state.lista.push(name);
  updateInventory();
}

function removeItem(name) {
  const idx = state.lista.indexOf(name);
  if (idx !== -1) {
    state.lista[idx] = '';
  }
  updateInventory();
}

function hasItem(name) {
  return state.lista.includes(name);
}

function updateInventory() {
  const items = state.lista.filter(x => x !== '');
  const isMobile = window.innerWidth <= 600;
  if (!invList) return;
  invList.innerHTML = items.map(i => `<li>• ${i}</li>`).join('');
  if (isMobile) {
    // On mobile, sidebar visibility is controlled by toggle button only
    invToggle.style.display = items.length > 0 ? 'block' : 'none';
    // If sidebar is open, keep it open; don't auto-show
  } else {
    sidebar.style.display = items.length > 0 ? 'block' : 'none';
  }
}

// --- Kiírás (DOM batch-eléssel) ---
let _printBuffer = null;

function _ensureBuffer() {
  if (!_printBuffer) _printBuffer = document.createDocumentFragment();
}

function _flushBuffer() {
  if (_printBuffer) {
    output.appendChild(_printBuffer);
    _printBuffer = null;
    output.scrollTop = output.scrollHeight;
  }
}

function print(text, cls = 'line') {
  _ensureBuffer();
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  _printBuffer.appendChild(div);
}

function println(text, cls) {
  if (text === '' || text === undefined) {
    _ensureBuffer();
    const div = document.createElement('div');
    div.className = 'line empty';
    _printBuffer.appendChild(div);
  } else {
    print(text, cls ? `line ${cls}` : 'line');
  }
}

function printDeath(text) { println(text, 'death'); }
function printSuccess(text) { println(text, 'success'); }
function printSystem(text) { println(text, 'system'); }

// --- Játék indítása ---
function startGame() {
  introOverlay.style.display = 'none';
  if (porzasInterval) clearInterval(porzasInterval);
  if (blinkInterval) clearInterval(blinkInterval);
  state.a = 2;
  state.otth = 0;
  // Reset mobile sidebar
  sidebarOpen = false;
  sidebar.style.display = 'none';
  processRoom();
  _flushBuffer();
  cmdInput.focus();
}

// --- Parancsarchívum ---
const cmdHistory = [];
let cmdHistoryIdx = -1;

// --- Parancs feldolgozás ---
cmdInput.addEventListener('keydown', function(e) {
  // Parancsarchívum: nyíl fel/le
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cmdHistory.length > 0) {
      if (cmdHistoryIdx < cmdHistory.length - 1) cmdHistoryIdx++;
      cmdInput.value = cmdHistory[cmdHistoryIdx];
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cmdHistoryIdx > 0) {
      cmdHistoryIdx--;
      cmdInput.value = cmdHistory[cmdHistoryIdx];
    } else {
      cmdHistoryIdx = -1;
      cmdInput.value = '';
    }
    return;
  }

  if (e.key === 'Enter') {
    e.stopPropagation();
    if (cmdInput.disabled) return;
    const raw = cmdInput.value.trim().toLowerCase();
    cmdInput.value = '';
    if (!raw) return;

    // Archívumba mentés
    cmdHistory.unshift(raw);
    if (cmdHistory.length > 50) cmdHistory.pop();
    cmdHistoryIdx = -1;

    try {
      dispatchCommand(raw);
    } finally {
      _flushBuffer();
    }
  }
});

function dispatchCommand(raw) {
    println('');
    print(`C:\\>${raw}`, 'line system');
    println('');

    state.parancs = raw;
    state.para = raw.length > 3 ? raw.substring(0, 3) : raw;
    state.use = false;

    // Vizsgál parancs
    if (state.para === 'viz') {
      parseObject(raw);
      handleVizsgal();
      return;
    }

    // Használ parancs
    if (state.para === 'has') {
      parseObjectH(raw);
      handleHasznal();
      processRoom();
      return;
    }

    // Globális parancsok
    if (state.para === 'seg') { showHelp(); return; }
    if (state.para === 'lis' || state.para === 'l') { showInventory(); return; }
    if (state.para === 'vég' || state.para === 'bef') {
      state.a = 1;
      handleHalal();
      return;
    }
    if (state.para === 'néz' || state.para === 'nez') {
      state.otth = 0;
      processRoom();
      return;
    }
    if (state.para === 'cls') {
      output.innerHTML = '';
      return;
    }

    // Szoba-specifikus parancsok
    processCommand();
}

function parseObject(raw) {
  const parts = raw.split(' ');
  if (parts.length > 1) {
    state.targy = parts[1].substring(0, 3);
  } else {
    state.targy = '';
  }
}

function parseObjectH(raw) {
  const parts = raw.split(' ');
  if (parts.length > 1) {
    state.targyh = parts[1].substring(0, 3);
  } else {

  }
}

// --- Halál ---
function handleHalal() {
  if (state.a === 1) {
    state.a = 0;
    println('');
    printDeath('Kalandod itt véget ér.');
    println('');
    printSystem('[ Kattints ide vagy nyomj ENTER-t az újrakezdéshez ]');
    _flushBuffer();
    cmdInput.disabled = true;
    document.addEventListener('keydown', restartHandler, { once: true });
    output.addEventListener('click', restartClick, { once: true });
  }
}

function restartHandler(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    restartGame();
  }
}
function restartClick() { restartGame(); }

function restartGame() {
  // Takarítás: lehetséges maradék listenerek eltávolítása
  document.removeEventListener('keydown', restartHandler);
  output.removeEventListener('click', restartClick);
  output.innerHTML = '';
  state = freshState();
  // Reset mobile sidebar
  sidebarOpen = false;
  sidebar.style.display = 'none';
  updateInventory();
  processRoom();
  _flushBuffer();
  cmdInput.disabled = false;
  cmdInput.focus();
}

// --- Ellenőrzés ---
function checkUnknownCommand() {
  const p = state.para;
  const known = ['néz','nez','has','é','k','ny','d','ker','seg','l','lis','vár','var',
                 'vég','bef','ige','nem','viz','cls'];
  if (!known.includes(p)) {
    println('Ezt a parancsot nem ismerem. Próbáltad már a segítség-et?');
  }
  if (!state.ker && p === 'ker') println('Nem találsz semmit.');
  if (!state.vara && (p === 'vár' || p === 'var')) println('Nem történik semmi.');
}

// --- Szobák ---
function processRoom() {
  if (state.a === 0) {
    // Game over (victory) - offer restart
    println('');
    printSystem('[ Kattints ide vagy nyomj ENTER-t az újrakezdéshez ]');
    _flushBuffer();
    cmdInput.disabled = true;
    document.addEventListener('keydown', restartHandler, { once: true });
    output.addEventListener('click', restartClick, { once: true });
    return;
  }
  if (state.a === 1) { handleHalal(); return; }
  const room = rooms[state.a];
  if (room && room.describe) {
    const prevA = state.a;
    room.describe();
    // describe() közben bekövetkezhet halál, győzelem, vagy szobaváltás
    if (state.a !== prevA) {
      processRoom();
      return;
    }
  }
}

function processCommand() {
  const room = rooms[state.a];
  if (room && room.command) {
    state.ker = false;
    state.vara = false;
    room.command();
    checkUnknownCommand();
    if (state.a === 1) handleHalal();
    else processRoom();
  }
}
